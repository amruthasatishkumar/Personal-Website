backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
  branch: main

media_folder: "site/public/images/blog"
public_folder: "/images/blog"

site_url: https://amruthasatishkumar.com
display_url: https://amruthasatishkumar.com

collections:
  - name: blog
    label: Articles
    label_singular: Article
    folder: "site/src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    preview_path: "blog/{{slug}}"
    sortable_fields: ["pubDate", "title"]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: text, required: false }
      - { name: pubDate, label: Publish Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: updatedDate, label: Updated Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { name: category, label: Category, widget: string, default: "Data & AI" }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: cover, label: Cover Image, widget: image, required: false }
      - { name: readTime, label: Read Time, widget: string, default: "5 min" }
      - { name: featured, label: Featured, widget: boolean, default: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }
